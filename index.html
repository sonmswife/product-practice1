<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="theme-toggle" id="theme-toggle" title="테마 변경">
            <span class="sun">☀️</span>
            <span class="moon">🌙</span>
        </div>
        <header>
            <h1>Lotto 6/45</h1>
            <p>오늘의 행운 번호를 확인해보세요!</p>
        </header>
        
        <div class="display-area">
            <div id="balls-container" class="balls-container">
                <!-- Balls will appear here -->
                <div class="placeholder-text">버튼을 눌러 번호를 생성하세요</div>
            </div>
        </div>

        <button id="generate-btn" class="generate-btn">
            번호 생성하기
        </button>

        <hr class="divider">

        <section class="partnership-section">
            <h3>제휴 문의</h3>
            <p>비즈니스 제휴 및 기타 문의사항을 남겨주세요.</p>
            <form action="https://formspree.io/f/mreypqpr" method="POST" id="partnership-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="이름" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" rows="4" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
